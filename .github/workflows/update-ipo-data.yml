name: Update Daily IPO Data

on:
  schedule:
    # 10:00 UTC = 6:00 PM Malaysia Time. Runs Monday to Friday (Market close).
    - cron: '0 10 * * 1-5'
  workflow_dispatch: # Allows manual click run

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm install axios cheerio
          
      - name: Run IPO Data Scraper
        run: node scraper.js
        
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update: Daily IPO market data [iSaham]" && git push)
